<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="form.css">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="form-box shadow p-4">
    <h3 class="text-center mb-3">Contact Us</h3>

    <!-- Name -->
    <input type="text" id="name" class="form-control mb-2" placeholder="Enter Name">
    <small id="nameError" class="text-danger"></small>

    <!-- Email -->
    <input type="text" id="email" class="form-control mt-3 mb-2" placeholder="Enter Email">
    <small id="emailError" class="text-danger"></small>

    <!-- Button -->
    <button id="submitBtn" class="btn btn-primary w-100 mt-3">Submit</button>

  </div>

</div>

<script src="form.js"></script>

</body>
</html>
